server:
  port: 8083

spring:
  application:
    name: org-service
  config:
    import: "optional:configserver:"
  cloud:
    config:
      enabled: false
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

kafka:
  topics:
    country-created: org.country.created
    country-updated: org.country.updated
    country-deleted: org.country.deleted
    city-created: org.city.created
    city-updated: org.city.updated
    city-deleted: org.city.deleted
    company-created: org.company.created
    company-updated: org.company.updated
    company-deleted: org.company.deleted
    campus-created: org.campus.created
    campus-updated: org.campus.updated
    campus-deleted: org.campus.deleted
    department-created: org.department.created
    department-updated: org.department.updated
    department-deleted: org.department.deleted
    team-created: org.team.created
    team-updated: org.team.updated
    team-deleted: org.team.deleted

outbox:
  batch-size: 50
  polling-interval-ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    oauth:
      client-id: swagger-ui
      use-pkce-with-authorization-code-grant: true
    oauth2-redirect-url: http://localhost:8083/swagger-ui/oauth2-redirect.html
  show-actuator: false
